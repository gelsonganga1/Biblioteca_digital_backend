services:
  - type: web
    name: agendamento-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    nodeVersion: 20
    envVars:
      - key: PORT
        value: 3005
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: agendamento-db
          property: connectionString
      - key: OMBALA_API_TOKEN
        sync: false
      - key: OMBALA_SENDER
        sync: false

databases:
  - name: agendamento-db
    plan: free
    databaseName: agendamento
    user: agendamento_user
