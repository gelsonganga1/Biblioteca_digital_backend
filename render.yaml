services:
  - type: web
    name: agendamento-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3005
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: agendamento-db
          property: connectionString

databases:
  - name: agendamento-db
    plan: free
    databaseName: agendamento
    user: agendamento_user
